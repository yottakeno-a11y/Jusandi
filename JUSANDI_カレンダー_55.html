<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUSANDI 予約カレンダー</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Hiragino Sans','Yu Gothic',Arial,sans-serif;background:#f0f0ec;font-size:13px;display:flex;flex-direction:column}
.topbar{flex-shrink:0;background:#1D9E75;color:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:nowrap;z-index:100}
.topbar h1{font-size:15px;font-weight:700;white-space:nowrap}
.topnav{display:flex;align-items:center;gap:6px}
.nbtn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:5px 12px;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.mlbl{font-size:13px;font-weight:600;min-width:72px;text-align:center}
.load-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.status{flex-shrink:0;background:#e8f5f0;border-bottom:1px solid #b2ddd0;padding:6px 14px;font-size:12px;color:#0F6E56;display:none}

/* グリッドラッパー：残りの高さを全部使い両方向スクロール */
.grid-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative}

.grid{border-collapse:collapse;width:max-content;min-width:100%}

/* ヘッダー行：グリッドラッパー内でtop:0にstickyすれば常に見える */
.grid thead th{
  position:sticky;top:0;z-index:30;
  font-size:10px;font-weight:700;padding:6px 3px;
  text-align:center;border:1px solid #aaa;white-space:nowrap
}
.th-day{background:#333;color:#fff;min-width:44px;width:44px;position:sticky;left:0;z-index:40}
.th-wk{background:#444;color:#fff;min-width:22px;width:22px;position:sticky;left:36px;z-index:40}
.th-y{background:#0F6E56;color:#fff;min-width:112px}
.th-s{background:#534AB7;color:#fff;min-width:112px}
.th-b{background:#185FA5;color:#fff;min-width:112px}
.th-g{background:#854F0B;color:#fff;min-width:116px}
.th-m{background:#993C1D;color:#fff;min-width:112px}
.th-r{background:#3d6b5e;color:#fff;min-width:110px}
.th-sh{background:#2c3e50;color:#fff;min-width:140px}
.fac-inline{border-top:1px dashed #d0e8d0;margin-top:3px;padding-top:3px;cursor:pointer}
.fac-inline:hover{background:rgba(46,125,50,0.05);border-radius:3px}
.fac-badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700;display:inline-flex;align-items:center;gap:2px;margin-bottom:2px;white-space:nowrap}
.fb-beaver{background:#e8f5e9;color:#2e7d32}
.fb-mow{background:#f1f8e9;color:#558b2f}
.fb-pool{background:#e3f2fd;color:#1565c0}
.fb-cut{background:#fbe9e7;color:#bf360c}
.fac-none{font-size:9px;color:#ccc;padding:4px 0}

/* 日付列・曜日列：左固定 */
.td-day{
  background:#f8f8f5;text-align:center;font-weight:700;font-size:13px;
  padding:3px 2px;border:1px solid #ccc;vertical-align:top;
  white-space:nowrap;color:#333;
  position:sticky;left:0;z-index:10;min-width:44px;width:44px
}
.td-wk{
  background:#f8f8f5;text-align:center;font-size:10px;
  padding:2px 1px;border:1px solid #ccc;vertical-align:middle;
  white-space:nowrap;color:#888;
  position:sticky;left:36px;z-index:10;min-width:22px;width:22px
}
.td-day.sat{color:#185FA5;background:#eff3fb}
.td-day.sun{color:#cc3333;background:#fdf0f0}
.td-wk.sat{color:#185FA5;background:#eff3fb}
.td-wk.sun{color:#cc3333;background:#fdf0f0}
.today-row .td-day,.today-row .td-wk{background:#fff8e1!important;color:#8a5c00}

/* データセル */
.td-cell{border:1px solid #ddd;vertical-align:top;padding:0;background:#fff;cursor:pointer;overflow:hidden}
.td-cell:active{filter:brightness(.97)}
.td-cell.empty{background:#f9f9f7;cursor:default;padding:4px 5px}
.td-cell.hol{background:#fff5f5;cursor:default;padding:4px 5px}
.td-cell.r-cell{background:#f4faf8;padding:4px 5px}
.td-cell.sh-cell{background:#f8f8f5;vertical-align:top;padding:4px 5px}
.today-row .td-cell{background:#fffef5}
.today-row .td-cell.sh-cell{background:#fffde6}
.cell-single{padding:4px 5px}
.cell-single.checkin{background:#f0faf5;border-left:3px solid #1D9E75}
.cell-single.stay{background:#f9f9f9;border-left:3px solid #bbb}
.cell-single.out-only{background:#fff5f8;border-left:3px solid #e91e8c}
.cell-single.prev-only{background:#fffef0;border-left:3px solid #f9a825}
.cell-combo{padding:4px 5px;background:#fff8f0;border-left:3px solid #e65100}
.combo-divider{border-top:1px dashed #ddd;margin:4px 0}
.hol-mark{font-size:10px;color:#cc3333;font-weight:700;text-align:center;padding:8px 2px}
.c-guest{font-size:10px;font-weight:700;color:#1a1a18;line-height:1.35;margin-bottom:2px}
.badge{font-size:9px;padding:1px 4px;border-radius:4px;font-weight:700;display:inline-block;white-space:nowrap}
.b-ni{background:#dff2ea;color:#0a5c3e}.b-bf{background:#e8f5dc;color:#2e6b00}
.b-bfr{background:#faeeda;color:#854F0B}.b-dn{background:#ddeeff;color:#0a3d8a}
.b-drt{background:#eeedfe;color:#534AB7}
.time-badge{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700;display:inline-flex;align-items:center;gap:2px;margin-bottom:3px}
.tb-ci{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
.tb-co{background:#fce4ec;color:#880e4f;border:1px solid #f48fb1}
.ev-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.ev-icon{font-size:13px;line-height:1}
.staff-grid{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.sl{display:flex;align-items:flex-start;gap:3px;min-height:15px}
.slbl{font-size:8px;padding:2px 4px;border-radius:3px;font-weight:700;white-space:nowrap;flex-shrink:0;text-align:center;margin-top:1px}
.lbf{background:#e8f5dc;color:#2e6b00}.ldn{background:#ddeeff;color:#0a3d8a}
.lout{background:#fce4ec;color:#880e4f}.lstay{background:#e3f2fd;color:#0d47a1}
.lou{background:#d3eaff;color:#0c447c}
.lprev-in{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.lprev-set{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.lout-combo{background:#fce4ec;color:#880e4f}
.lin-combo{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.lri{background:#fbe9e7;color:#bf360c}.lro{background:#e8eaf6;color:#283593}
.lbl{background:#e8f4e8;color:#1b5e20}.lws{background:#e3f2fd;color:#0d47a1}
.sname{font-size:9px;color:#222;font-weight:600}.snone{font-size:9px;color:#ccc}
.multi-names{display:flex;flex-wrap:wrap;gap:2px;flex:1}
.multi-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:#d3eaff;color:#0c447c;font-weight:600}
.sec-lbl{font-size:8px;font-weight:700;margin-bottom:3px}
.sec-lbl.out-lbl{color:#880e4f}.sec-lbl.prev-lbl{color:#f57f17}.sec-lbl.combo-lbl{color:#e65100}
.tr-btn{font-size:11px;padding:2px 7px;border-radius:5px;border:1.5px solid #ddd;background:#f5f5f2;cursor:pointer;line-height:1.4}
.tr-btn.active-taxi{background:#fff8e1;border-color:#f9a825;color:#e65100;font-weight:700}
.tr-btn.active-rent{background:#e8f5e9;border-color:#43a047;color:#2e7d32;font-weight:700}
.transport-row{display:flex;gap:4px;margin-bottom:3px;flex-wrap:wrap}
.r-sec{margin-bottom:4px;padding-bottom:4px;border-bottom:1px dashed #d0ebe5}
.r-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.r-sec-lbl{font-size:8px;font-weight:700;color:#3d6b5e;margin-bottom:2px;text-transform:uppercase}
.sh-section{margin-bottom:5px;padding-bottom:5px;border-bottom:1px dashed #ddd}
.sh-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sh-sec-lbl{font-size:8px;font-weight:700;color:#555;margin-bottom:3px;text-transform:uppercase}
.sh-entry{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.sh-type{font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.sh-name{font-size:10px;font-weight:600;color:#222;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sh-time{font-size:9px;color:#888;white-space:nowrap}
.sh-none{font-size:9px;color:#ccc;padding:3px 0}
.front-line{display:flex;align-items:center;gap:4px}
.front-lbl{font-size:8px;padding:2px 5px;border-radius:4px;font-weight:700;background:#fff3e0;color:#e65100;white-space:nowrap;flex-shrink:0}
.mov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.48);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:10px;overflow-y:auto}
.mbox{background:#fff;border-radius:14px;padding:16px;width:100%;max-width:360px;margin:auto}
.mtitle{font-size:13px;font-weight:700;margin-bottom:8px}
.minfo{font-size:11px;color:#666;margin-bottom:10px;padding:8px 10px;background:#f5f5f2;border-radius:8px;line-height:1.6}
.msec{font-size:10px;font-weight:700;color:#999;margin:12px 0 6px;border-top:1px solid #eee;padding-top:10px}
.msec.first{margin-top:0;border-top:none;padding-top:0}
.sg{margin-bottom:9px}
.slb{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;margin-bottom:6px}
.slb-b{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700}
select,input[type=time]{width:100%;font-size:13px;padding:7px 9px;border:1px solid #ddd;border-radius:8px;font-family:inherit;background:#fff;color:#1a1a18}
.transport-sel{display:flex;gap:8px;margin-top:4px}
.tr-sel-btn{flex:1;padding:12px 8px;border-radius:10px;border:2px solid #eee;background:#fafaf8;cursor:pointer;font-family:inherit;font-size:13px;text-align:center}
.tr-sel-btn.sel-taxi{border-color:#f9a825;background:#fff8e1;color:#e65100;font-weight:700}
.tr-sel-btn.sel-rent{border-color:#43a047;background:#e8f5e9;color:#2e7d32;font-weight:700}
.tr-sel-btn.sel-none{border-color:#ddd;background:#f5f5f2;color:#999}
.multi-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.mc-lbl{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:6px 8px;border:1px solid #e0eeff;border-radius:8px;background:#f5f9ff}
.mc-lbl input{width:15px;height:15px;accent-color:#0c447c;cursor:pointer;flex-shrink:0}
.mc-lbl.checked{background:#d3eaff;border-color:#6fb3f7}
.ev-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:4px}
.ev-chk-lbl{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:5px;border:1px solid #eee;border-radius:8px;background:#fafaf8}
.ev-chk-lbl input{width:14px;height:14px;accent-color:#1D9E75;cursor:pointer;flex-shrink:0}
.sh-row-modal{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:6px 8px;border:1px solid #eee;border-radius:8px;background:#fafaf8}
.sh-type-lbl{font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.sh-time-lbl{font-size:10px;color:#888;min-width:84px;flex-shrink:0}
.sh-name-sel{flex:1;font-size:12px;padding:5px 6px;border:1px solid #ddd;border-radius:6px;font-family:inherit;background:#fff}
.front-row-modal{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:8px 10px;border:2px solid #ffe0b2;border-radius:8px;background:#fffbf5}
.front-label-m{font-size:11px;font-weight:700;color:#e65100;min-width:60px;flex-shrink:0}
.mbtns{display:flex;gap:8px;margin-top:14px}
.bcl{flex:1;padding:9px;background:#f5f5f2;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.bsv{flex:1;padding:9px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

.view-tab{flex:1;padding:9px 4px;border:none;background:transparent;font-size:12px;font-family:inherit;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.view-tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:700}
.panel-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* 不可日カレンダー */
.off-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
.off-day{height:40px;border-radius:8px;border:1px solid #e0e0da;background:#fff;font-size:12px;font-weight:600;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;-webkit-tap-highlight-color:transparent}
.off-day.sat{color:#185FA5;background:#f0f4fc}
.off-day.sun{color:#cc3333;background:#fdf0f0}
.off-day.off{background:#ff5252;color:#fff;border-color:#cc3333}
.off-day.today{border:2px solid #1D9E75}
.off-day.empty{background:transparent;border:none;cursor:default}
.off-wk-hdr{text-align:center;font-size:10px;color:#999;padding:2px 0}
/* グレーアウト */
.mc-lbl.disabled{background:#f5f5f5;border-color:#e0e0da;color:#bbb;cursor:not-allowed;opacity:.6}
.mc-lbl.disabled input{cursor:not-allowed;accent-color:#bbb}
.unavail-badge{font-size:8px;color:#cc3333;display:block;line-height:1}
.off-chip{font-size:8px;padding:1px 3px;border-radius:3px;background:#ffeeee;color:#cc3333;font-weight:700;display:block;margin-top:1px;line-height:1.3}
</style>
</head>
<body>
<datalist id="nat-list">
  <option value="日本"><option value="アメリカ"><option value="オーストラリア">

  <option value="イタリア"><option value="スペイン"><option value="ブラジル">

<datalist id="lang-list">
  <option value="日本語"><option value="英語"><option value="中国語">
  <option value="韓国語"><option value="フランス語"><option value="ドイツ語">
  <option value="スペイン語"><option value="ポルトガル語"><option value="タイ語">
  <option value="ヘブライ語"><option value="ロシア語"><option value="イタリア語">
</datalist>
<div class="topbar">
  <h1>🏡 JUSANDI</h1>
  <div class="topnav">
    <button class="nbtn" onclick="chM(-1)">‹</button>
    <span class="mlbl" id="mlbl"></span>
    <button class="nbtn" onclick="chM(1)">›</button>
  </div>
  <button class="load-btn" onclick="autoScheduleFac(event)">⚡ 施設管理自動</button><button class="load-btn" onclick="document.getElementById('xl-input').click()">📂 Excel読込</button>

</div>

<script>
document.body.style.background='#ffe';
const VILLAS=['YARABU','SANNIN','BINDO','GASHIMUNE','MAANI'];
const WEEK=['日','月','火','水','木','金','土'];
const EVS=[{k:'Can',icon:'🕯'},{k:'FL',icon:'💐'},{k:'Cake',icon:'🎂'},{k:'Spa',icon:'💆'},{k:'Photo',icon:'📷'},{k:'Wine',icon:'🍷'},{k:'Other',icon:'✨'}];
const SHIFT_TYPES=[
  {id:'A',time:'8:00〜',color:'#2e7d32'},
  {id:'B',time:'9:00〜',color:'#1565c0'},
  {id:'C',time:'10:00〜',color:'#6a1b9a'},
  {id:'D',time:'11:00〜',color:'#e65100'},
  {id:'E',time:'12:00〜',color:'#c62828'},
  {id:'F',time:'13:00〜',color:'#00838f'},
  {id:'G',time:'22:00〜3:00',color:'#37474f'},
  {id:'H',time:'8:00〜18:00(B2H)',color:'#4e342e'},
  {id:'I',time:'12:00〜16:00',color:'#00695c'},
  {id:'J',time:'10:00〜19:00',color:'#f57f17'},
  {id:'K',time:'9:00〜22:00(B1h)',color:'#4527a0'},
  {id:'L',time:'8:00〜12:00',color:'#558b2f'},
  {id:'M',time:'18:00〜22:00',color:'#ad1457'},
  {id:'N',time:'18:00〜3:00',color:'#283593'},
  {id:'O',time:'14:00〜18:00',color:'#6d4c41'},
]
function villaHasGuest(villa,dk){
  var bks=BD[villa]||{};
  var keys=Object.keys(bks);
  for(var ki=0;ki<keys.length;ki++){
    var ciDk=keys[ki];
    var bkArr=bks[ciDk];
    for(var bi=0;bi<bkArr.length;bi++){
      var b=bkArr[bi];
      if(b.g==='休館日'&&ciDk===dk)return true;

function loadXL(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
      BD={YARABU:{},SANNIN:{},BINDO:{},GASHIMUNE:{},MAANI:{}};
      HOLIDAYS.clear();let cnt=0;
      const monthSheets=wb.SheetNames.filter(n=>/\d{4}年\d{1,2}月/.test(n));
      const sheets=monthSheets.length>0?monthSheets:[wb.SheetNames[0]];
      sheets.forEach(shName=>{
        const ws=wb.Sheets[shName];if(!ws)return;
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'YYYY/MM/DD'});
        rows.slice(1).forEach(row=>{
          if(!row[0]||!row[1])return;
          const villa=String(row[0]).trim();if(!VILLAS.includes(villa))return;
          const ds=String(row[1]).trim();
          const mm=ds.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);if(!mm)return;
          const dk=mm[1]+'-'+mm[2].padStart(2,'0')+'-'+mm[3].padStart(2,'0');
          const b=nb(String(row[2]||'').trim(),parseInt(row[3])||0,String(row[4]||'').trim(),String(row[5]||'').toUpperCase()==='YES');
          if(b.g==='休館日'){HOLIDAYS.add(dk);return;}
          b.bf=String(row[7]||'').trim();b.dn=String(row[8]||'').trim();
          b.si_in=String(row[9]||'').split(',').map(x=>x.trim()).filter(x=>x);
          b.setting=String(row[10]||'').trim();
          b.si_stay=String(row[11]||'').split(',').map(x=>x.trim()).filter(x=>x);
          b.si_out=String(row[12]||'').split(',').map(x=>x.trim()).filter(x=>x);
          b.so_prev=String(row[13]||'').split(',').map(x=>x.trim()).filter(x=>x);
          b.so=String(row[14]||'').split(',').map(x=>x.trim()).filter(x=>x);
          b.ci=String(row[15]||'').trim();b.co=String(row[16]||'').trim();
          b.ev=String(row[17]||'').split(',').map(x=>x.trim()).filter(x=>x);
          b.bf_start=String(row[18]||'').trim();b.bf_end=String(row[19]||'').trim();
          b.dn_start=String(row[20]||'').trim();b.dn_end=String(row[21]||'').trim();
          b.nationality=String(row[22]||'').trim();b.language=String(row[23]||'').trim();
          if(!BD[villa][dk])BD[villa][dk]=[];BD[villa][dk].push(b);cnt++;
        });
      });
      const mo=parseInt(sheets[0].match(/\d{4}年(\d{1,2})月/)?.[1]||6);
      const yr=parseInt(sheets[0].match(/(\d{4})年/)?.[1]||2026);
      curY=yr;curM=mo;
      const st=document.getElementById('status');
      if(st){st.style.display='block';st.textContent='✅ '+file.name+' 読込完了（予約'+cnt+'件）';}
      render();
    }catch(err){alert('読み込み失敗: '+err.message);}
  };reader.readAsBinaryString(file);e.target.value='';
}

// 自動スケジュールボタンをシフトヘッダー上に表示（別途）
function shiftCellHtml(dk){
  const s=getSD(dk);
  // 出勤スタッフ（シフトに割り当てられた人の一覧）
  const workingSet=new Set();
  SHIFT_TYPES.forEach(t=>{
    const names=Array.isArray(s[t.id])?s[t.id]:(s[t.id]?[s[t.id]]:[]);
    names.forEach(n=>{if(n)workingSet.add(n);});
  });
  if(s.front){
    const fr=Array.isArray(s.front)?s.front:(s.front?[s.front]:[]);
    fr.forEach(n=>{if(n)workingSet.add(n);});
  }
  // 不可スタッフ
  const unavail=STAFF.filter(st=>isUnavail(st,dk));
  // 出勤シフト表示
  const entries=SHIFT_TYPES.filter(t=>s[t.id]&&(Array.isArray(s[t.id])?s[t.id].length:s[t.id]));
  const shiftHtml=entries.map(t=>{
    const names=Array.isArray(s[t.id])?s[t.id]:[s[t.id]];
    return names.map(n=>`<div style="display:flex;align-items:center;gap:3px;margin-bottom:2px"><span class="sh-type-lbl" style="background:${t.color}">${t.id}</span><span style="font-size:9px">${t.time}</span><span style="font-size:10px;font-weight:600">${n}</span></div>`).join('');
  }).join('');
  // フロント表示
  const frontNames=Array.isArray(s.front)?s.front:(s.front?[s.front]:[]);
  const frontHtml=frontNames.length?`<div style="font-size:9px;padding:2px 5px;border-radius:4px;background:#e8f5e9;color:#1b5e20;margin-bottom:3px;font-weight:700">🏨 ${frontNames.join('・')}</div>`:'';
  // 不可スタッフ表示
  const unavHtml=unavail.length?`<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;padding-top:3px;border-top:1px dashed #eee">${unavail.map(st=>'<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:#ffebee;color:#c62828">🙅'+st+'</span>').join('')}</div>`:'';
  // 出勤者バッジ（シフト未割当でも表示）
  const workHtml=workingSet.size?`<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px">${[...workingSet].map(st=>'<span style="font-size:8px;padding:1px 5px;border-radius:3px;background:#e3f2fd;color:#1565c0;font-weight:600">✓'+st+'</span>').join('')}</div>`:'';
  const isEmpty=!shiftHtml&&!frontHtml&&workingSet.size===0;
  return`<td class="td-cell sh-cell" onclick="openShiftModal('${dk}')">
    ${frontHtml}
    ${shiftHtml||`<div style="font-size:9px;color:#ccc;text-align:center;padding:2px">シフト未入力</div>`}
    ${unavHtml}
  </td>`;
}


function chM(d){curM+=d;if(curM>12){curM=1;curY++}if(curM<1){curM=12;curY--}render();}

function render(){
  try{
  document.getElementById('mlbl').textContent=`${curY}年${curM}月`;
  const days=dim(curY,curM);const today=new Date();
  const todayKey=key(today.getFullYear(),today.getMonth()+1,today.getDate());
  const CELLS=buildCells();
  let html=`<thead><tr>
    <th class="th-day">日</th><th class="th-wk">曜</th>
    <th class="th-y">YARABU</th><th class="th-s">SANNIN</th>
    <th class="th-b">BINDO</th><th class="th-g">GASHIMUNE</th>
    <th class="th-m">MAANI</th><th class="th-r">Reception棟</th>
    <th class="th-sh">出勤 / フロント</th>
  </tr></thead><tbody>`;
  for(let d=1;d<=days;d++){
    const dk=key(curY,curM,d);const dow=new Date(curY,curM-1,d).getDay();
    const isToday=dk===todayKey;
    const wc=dow===0?'sun':dow===6?'sat':'';
    html+=`<tr class="${isToday?'today-row':''}">`;
    // 不可スタッフ
    const offList=STAFF.filter(st=>isUnavail(st,dk));
    const offHtml=offList.map(st=>`<span class="off-chip">${st}</span>`).join('');
    html+=`<td class="td-day ${wc}" style="padding:3px 2px">
      <div style="font-size:13px;font-weight:700">${d}</div>
      ${offHtml}
    </td>`;
    html+=`<td class="td-wk ${wc}">${WEEK[dow]}</td>`;
    VILLAS.forEach(v=>{html+=buildCellHtml(dk,v,CELLS[v][dk]);});
    html+=rCellHtml(dk);html+=shiftCellHtml(dk);html+='</tr>';
  }
  html+='</tbody>';
  document.getElementById('grid').innerHTML=html;
  }catch(err){
    alert('renderエラー: '+err.message+'\n行: '+err.stack);
    console.error(err);
  }
}

    ev_time:(document.getElementById('n-ev-time')||{}).value||'',
    ev_note:(document.getElementById('n-ev-note')||{}).value||'',
    activities:getActRows(),
    dineout:(document.getElementById('n-dineout')||{}).value||'',
    request:(document.getElementById('n-request')||{}).value||'',
    taxi_time:(document.getElementById('n-taxi-time')||{}).value||'',
    taxi_contacts:getTaxiContacts('n'),
    bf:(document.getElementById('n-bf')||{}).value||'',
    bf_type:(document.getElementById('n-bf-type')||{}).value||'',
    bf_start:(document.getElementById('n-bf-s')||{}).value||'',
    bf_end:(document.getElementById('n-bf-e')||{}).value||'',

    nationality_raw:'',language_raw:'',repeat:'',
    guests:{males:[],females:[],children:[]},
    bf:'',dn:'',
    bf_start:'',bf_end:'',dn_start:'',dn_end:''
  };
  // ゲスト情報
  b.nationality=(document.getElementById('n-nationality')||{}).value||'';
  b.language=(document.getElementById('n-language')||{}).value||'';
  b.bf=(document.getElementById('n-bf')||{}).value||'';
  b.dn=(document.getElementById('n-dn')||{}).value||'';
  b.bf_start=(document.getElementById('n-bf-s')||{}).value||'';
  b.bf_end=(document.getElementById('n-bf-e')||{}).value||'';
  b.dn_start=(document.getElementById('n-dn-s')||{}).value||'';
  b.dn_end=(document.getElementById('n-dn-e')||{}).value||'';
  // 施設管理
  const nFac=getFAC(villa,dk);
  FAC_ITEMS.forEach(it=>{
    const cb=document.getElementById('nfac-'+it.id);
    const sel=document.getElementById('nfac-staff-'+it.id);
    if(cb)nFac[it.id].on=cb.checked;
    if(sel)nFac[it.id].staff=sel.value;

function countGuestVillas(dk){
  // その日に宿泊客がいる棟の数
  return VILLAS.filter(v=>{
    const cells=buildCells();
    const cd=cells[v]&&cells[v][dk];
    if(!cd)return false;
    return cd.checkin||cd.stay||(cd.out&&!cd.prev);
  }).length;
}

  const ALL_V=VILLAS.concat(['Reception棟']);

  // 棟ごとに14日ごとの最適日を選ぶ
  const proposedByVilla={};
  ALL_V.forEach(v=>{
    const proposed=[];
    let nextTarget=1;
    while(nextTarget<=days){
      const window=[];
      for(let di=Math.max(1,nextTarget-3);di<=Math.min(days,nextTarget+3);di++){
        const dk=key(curY,curM,di);
        const hasGuest=villaHasGuest(v,dk);
        window.push({d:di,dk,hasGuest});
      }
      // 空室の日を優先
      const empty=window.filter(x=>!x.hasGuest);
      const best=empty.length?empty[Math.floor(empty.length/2)]:window[Math.floor(window.length/2)];
      proposed.push(best);
      nextTarget=best.d+14;
    }
    proposedByVilla[v]=proposed;
  });

  // プレビュー：棟ごとに表示
  const vColor={YARABU:'#0F6E56',SANNIN:'#534AB7',BINDO:'#185FA5',GASHIMUNE:'#854F0B',MAANI:'#993C1D','Reception棟':'#3d6b5e'};
  const preview=ALL_V.map(v=>{
    const rows=proposedByVilla[v].map(p=>{
      const dt=new Date(p.dk);const dow=WEEK[dt.getDay()];
      const st=p.hasGuest
        ?'<span style="font-size:10px;color:#f57f17">⚠️宿泊あり</span>'
        :'<span style="font-size:10px;color:#2e7d32">✅空室</span>';
      return`<span style="font-size:11px;margin-right:8px">${curM}/${p.d}(${dow}) ${st}</span>`;
    }).join('');
    return`<div style="margin-bottom:10px;padding:8px 10px;border:1px solid #eee;border-radius:8px;background:#fafaf8">
      <div style="font-size:11px;font-weight:700;color:${vColor[v]};margin-bottom:5px">${v}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${rows}</div>
    </div>`;
  }).join('');

  document.getElementById('mr').innerHTML=`
  <div class="mov" onclick="closeM(event)"><div class="mbox" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto">
    <div class="mtitle">⚡ 棟別 自動スケジュール提案</div>
    <div style="font-size:11px;color:#666;margin-bottom:12px">各棟ごとに14日ごとの空室日を選定。確定後に担当者を入力できます。</div>
    ${preview}
    <div class="mbtns">
      <button class="bcl" onclick="closeM()">キャンセル</button>
      <button class="bsv" onclick="confirmAutoFac(${JSON.stringify(proposedByVilla)})">この日程で確定</button>
    </div>
  </div></div>`;
}

function timeOpts(cur,startH=0,endH=23,endM=30){
  let o='<option value="">―</option>';
  for(let h=startH;h<=endH;h++){
    for(let m of [0,30]){
      if(h===endH&&m>endM)break;
      if(h===startH&&m<0)continue;
      const v=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      o+=`<option value="${v}"${cur===v?' selected':''}>${v}</option>`;
    }
  }
  return o;
}

  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(d.BD)BD=d.BD;if(d.FAC)FAC=d.FAC;
      if(d.HOLIDAYS)HOLIDAYS=new Set(d.HOLIDAYS);
      if(d.CLEAN_DATA)CLEAN_DATA=d.CLEAN_DATA;

function saveGuestToDB(b){

    g:key,
    nationality:b.nationality||'',
    language:b.language||'',
    payment:b.payment||'事前清算',
    allergy:b.allergy||'',
    dislike:b.dislike||'',

function searchGuests(q){
  if(!q)return[];
  const lq=q.toLowerCase();

}

function fillGuestInfo(name){
  const g=GUEST_DB[name];if(!g)return;
  const fields={
    'n-guest':g.g,'n-nationality':g.nationality,'n-language':g.language,
    'n-allergy':g.allergy,'n-dislike':g.dislike,'n-favorite':g.favorite
  };
  Object.entries(fields).forEach(([id,val])=>{
    const el=document.getElementById(id);if(el)el.value=val||'';
  });
  if(g.payment==='現地清算'){
    const loc=document.getElementById('n-pay-loc');if(loc)loc.checked=true;
  } else {
    const pre=document.getElementById('n-pay-pre');if(pre)pre.checked=true;
  }
  if(g.purpose&&g.purpose.length){
    document.querySelectorAll('.purp-chk-n').forEach(cb=>{cb.checked=g.purpose.includes(cb.value);});
  }
  document.getElementById('guest-suggest').innerHTML='';
  document.getElementById('guest-suggest').style.display='none';
}

function onGuestInput(val){
  const box=document.getElementById('guest-suggest');if(!box)return;
  const results=searchGuests(val);
  if(!results.length){box.style.display='none';return;}
  box.innerHTML=results.map(name=>'<div onclick="fillGuestInfo(\''+name.replace(/'/g,"\\'")+'\')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #eee;font-size:13px;hover:background:#f5f5f5">'+name+'</div>').join('');
  box.style.display='block';

function makeDraggable(box){
  if(!box||box._drag)return;
  box._drag=true;
  box.style.position='fixed';
  box.style.cursor='default';
  box.style.margin='0';
  const handle=box.querySelector('.mtitle')||box;
  handle.style.cursor='grab';
  let dragging=false,sx=0,sy=0,ox=0,oy=0;
  const start=function(e){
    e.stopPropagation();
    const p=e.touches?e.touches[0]:e;
    sx=p.clientX;sy=p.clientY;
    const r=box.getBoundingClientRect();
    ox=r.left;oy=r.top;
    box.style.left=ox+'px';box.style.top=oy+'px';
    box.style.transform='none';
    dragging=true;
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',stop);
    document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('touchend',stop);
  };
  const move=function(e){
    if(!dragging)return;
    if(e.cancelable)e.preventDefault();
    const p=e.touches?e.touches[0]:e;
    box.style.left=(ox+p.clientX-sx)+'px';
    box.style.top=(oy+p.clientY-sy)+'px';
  };
  const stop=function(){
    dragging=false;
    document.removeEventListener('mousemove',move);
    document.removeEventListener('mouseup',stop);
    document.removeEventListener('touchmove',move);
    document.removeEventListener('touchend',stop);
  };
  handle.addEventListener('mousedown',start);
  handle.addEventListener('touchstart',start,{passive:false});
}

function applyDrag(){
  const mr=document.getElementById('mr');
  if(!mr)return;
  const box=mr.querySelector('.mbox');
  if(box){
    box.style.maxHeight='80vh';
    box.style.overflowY='auto';
    box.style.position='fixed';
    box.style.top='10vh';
    box.style.left='50%';
    box.style.transform='translateX(-50%)';
    makeDraggable(box);
  }
}

  }

    const b=bks[0];if(!b)return;

      sections.push({label:'◀ CO',color:'#fce4ec',b});

    position:'fixed',zIndex:'9999',background:'#fff',
    border:'1px solid #ddd',borderRadius:'14px',
    padding:'14px',boxShadow:'0 8px 30px rgba(0,0,0,0.2)',
    maxWidth:'320px',minWidth:'220px',
    pointerEvents:'none',maxHeight:'80vh',overflowY:'auto'
  });
  document.body.appendChild(pop);
  const vw=window.innerWidth,vh=window.innerHeight;
  const t=e.target.closest('td');

  let left=tr.right+10;let top=tr.top;

  if(top+pop.scrollHeight>vh)top=Math.max(8,vh-pop.scrollHeight-8);

  const tabs = document.getElementById('off-staff-tabs');
  tabs.innerHTML = STAFF.map(s=>`
    <button onclick="selectOffStaff('${s}')" style="
      padding:7px 14px;border-radius:20px;border:1.5px solid ${curOffStaff===s?'#993C1D':'#ddd'};
      background:${curOffStaff===s?'#993C1D':'#fff'};color:${curOffStaff===s?'#fff':'#333'};
      font-size:13px;font-family:inherit;cursor:pointer;font-weight:${curOffStaff===s?'700':'400'}
    ">${s}</button>`).join('');

  const lbl = document.getElementById('off-selected-lbl');
  if(!curOffStaff){ lbl.textContent='← スタッフを選択してください'; renderOffCal(); return; }

  const offCount = Object.keys(UNAVAIL[curOffStaff]||{}).length;
  lbl.textContent = `${curOffStaff} さんの不可日：${offCount}日`;
  renderOffCal();
}


function offChM(d){
  curM+=d;
  if(curM>12){curM=1;curY++;}
  if(curM<1){curM=12;curY--;}
  document.getElementById('off-month-lbl').textContent=curY+'年'+curM+'月';
  renderOffView();
}
function selectOffStaff(s){
  curOffStaff = s;
  renderOffView();
}

function renderOffCal(){
  const cal = document.getElementById('off-cal');
  if(!curOffStaff){ cal.innerHTML=''; return; }
  const days = dim(curY, curM);
  const today = key(new Date().getFullYear(), new Date().getMonth()+1, new Date().getDate());
  const firstDow = new Date(curY, curM-1, 1).getDay();

  let html = '';
  // 空白
  for(let i=0;i<firstDow;i++) html += '<div class="off-day empty"></div>';
  // 日付
  for(let d=1;d<=days;d++){
    const dk = key(curY, curM, d);
    const dow = new Date(curY, curM-1, d).getDay();
    const isOff = isUnavail(curOffStaff, dk);
    const isTd = dk===today;
    const cls = [
      'off-day',
      dow===0?'sun':dow===6?'sat':'',
      isOff?'off':'',
      isTd?'today':''
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="toggleOff('${dk}')">${d}</div>`;
  }
  // 不可日リスト
  const offDays = Object.keys(UNAVAIL[curOffStaff]||{}).sort();
  if(offDays.length){
    html += `<div style="margin-top:14px;padding:10px;background:#fff5f5;border-radius:8px;border:1px solid #f5c1c1">
      <div style="font-size:11px;font-weight:700;color:#cc3333;margin-bottom:6px">🙅 登録済み不可日</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${offDays.map(dk=>{
          const dt=new Date(dk);
          const dow=dt.getDay();
          const wj=['日','月','火','水','木','金','土'][dow];
          return `<span onclick="toggleOff('${dk}')" style="font-size:11px;padding:3px 9px;border-radius:12px;background:#ff5252;color:#fff;cursor:pointer">${dt.getMonth()+1}/${dt.getDate()}(${wj}) ✕</span>`;
        }).join('')}
      </div>
    </div>`;
  }
  cal.innerHTML = html;
}

function toggleOff(dk){
  if(!curOffStaff) return;
  if(!UNAVAIL[curOffStaff]) UNAVAIL[curOffStaff]={};
  if(UNAVAIL[curOffStaff][dk]) delete UNAVAIL[curOffStaff][dk];
  else UNAVAIL[curOffStaff][dk] = true;
  renderOffView();
}

// multiCheckHtmlを不可日対応版に上書き
function multiCheckHtml(id, selected, dk){
  selected = selected||[];
  return `<div class="multi-check-grid">`+STAFF.map(s=>{
    const chk = selected.includes(s);
    const unavail = dk && isUnavail(s, dk);
    const disabledAttr = unavail ? 'disabled' : '';
    const disabledCls = unavail ? ' disabled' : '';
    const checkedCls = chk ? ' checked' : '';
    return `<label class="mc-lbl${checkedCls}${disabledCls}" id="mclbl-${id}-${s}">
      <input type="checkbox" class="mc-${id}" value="${s}" ${chk?'checked':''} ${disabledAttr}
        onchange="if(!this.disabled){this.closest('label').className='mc-lbl'+(this.checked?' checked':'');}">
      ${s}${unavail?`<span class="unavail-badge">🙅不可</span>`:''}
    </label>`;
  }).join('')+`</div>`;
}

try{render();}catch(e){document.body.innerHTML='<h1 style="color:red;font-size:20px;padding:20px">エラー: '+e.message+'<br><pre>'+e.stack+'</pre></h1>';}
</script>
<div id="mr"></div>
</body>
